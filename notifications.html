<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Notifications</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', Arial, sans-serif;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #FFD3AC 0%, #FFB47C 100%);
            display: flex;
            justify-content: center;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 1000px;
            border-radius: 25px;
            padding: 30px 40px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.18);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 {
            text-align: center;
            color: #FF7A2C;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .back-btn {
            background: #fff;
            border: 1px solid #FFD3AC;
            border-radius: 12px;
            padding: 10px 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .back-btn:hover {
            background: #FFC08A;
            transform: translateY(-2px);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 12px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            border: 1px solid #FFD3AC;
            background: #fff;
            transition: background 0.3s, transform 0.2s;
        }

        .tab:hover {
            transform: translateY(-2px);
        }

        .tab.active {
            background: #FF7A2C;
            color: #fff;
        }

        #notifList {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .notif-card {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            display: flex;
            gap: 20px;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .notif-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
        }

        .notif-card img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 15px;
            border: 1px solid #FFD3AC;
        }

        .notif-details {
            flex: 1;
        }

        .notif-details p {
            margin: 6px 0;
            font-size: 15px;
        }

        .notif-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .notif-actions button {
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s, transform 0.2s;
        }

        .accept-btn {
            background: #4CAF50;
            color: #fff;
        }

        .accept-btn:hover {
            background: #66bb6a;
            transform: translateY(-2px);
        }

        .reject-btn {
            background: #E53935;
            color: #fff;
        }

        .reject-btn:hover {
            background: #f0625f;
            transform: translateY(-2px);
        }

        .empty {
            text-align: center;
            font-size: 18px;
            color: #555;
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            .notif-card {
                flex-direction: column;
                text-align: center;
            }

            .notif-card img {
                width: 100px;
                height: 100px;
            }

            .notif-actions {
                flex-direction: row;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            h2 {
                font-size: 22px;
            }

            .tab {
                padding: 10px 14px;
                font-size: 14px;
            }

            .notif-card img {
                width: 80px;
                height: 80px;
            }

            .notif-actions button {
                padding: 10px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="top-bar">
            <button class="back-btn" onclick="goBack()">⬅ Back</button>
            <h2>APPROVAL REQUESTS</h2>
            <div></div>
        </div>

        <div class="tabs">
            <div class="tab active" id="visitorTab" onclick="showVisitors()">Visitors</div>
            <div class="tab" id="vehicleTab" onclick="showVehicles()">Vehicles</div>
        </div>

        <div id="notifList"></div>
        <div id="emptyState" class="empty" style="display:none;">
            No pending requests
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const villaId = params.get("villa_id");
        let currentMode = "visitors";

        if (!villaId) {
            alert("Villa ID missing");
            window.location.href = "/resident";
        }

        function showVisitors() {
            currentMode = "visitors";
            document.getElementById("visitorTab").classList.add("active");
            document.getElementById("vehicleTab").classList.remove("active");
            loadNotifications();
        }

        function showVehicles() {
            currentMode = "vehicles";
            document.getElementById("vehicleTab").classList.add("active");
            document.getElementById("visitorTab").classList.remove("active");
            loadNotifications();
        }

        async function loadNotifications() {
            const list = document.getElementById("notifList");
            const empty = document.getElementById("emptyState");
            list.innerHTML = "";

            const url = currentMode === "visitors"
                ? `/get_notifications?villa_id=${villaId}`
                : `/get_vehicle_notifications?villa_id=${villaId}`;

            const res = await fetch(url);
            const data = await res.json();

            const items = data.notifications || [];
            const pending = items.filter(n => n.status === "pending");

            if (pending.length === 0) {
                empty.style.display = "block";
                return;
            }
            empty.style.display = "none";

            pending.forEach(n => {
                const card = document.createElement("div");
                card.className = "notif-card";

                if (currentMode === "visitors") {
                    card.innerHTML = `
                    <img src="/static/uploads/${n.image}" onerror="this.src='/static/uploads/default.jpg'">
                    <div class="notif-details">
                        <p><b>Request ID:</b> ${n.notification_id}</p>
                        <p><b>Visitor Name:</b> ${n.name}</p>
                        <p><b>Detected At:</b> ${new Date(n.time * 1000).toLocaleString()}</p>
                    </div>
                    <div class="notif-actions">
                        <button class="accept-btn" onclick="decideVisitor('${n.notification_id}','accept')">ACCEPT</button>
                        <button class="reject-btn" onclick="decideVisitor('${n.notification_id}','reject')">REJECT</button>
                    </div>`;
                } else {
                    card.innerHTML = `
                    <div class="notif-details">
                        <p><b>Request ID:</b> ${n.notification_id}</p>
                        <p><b>Vehicle No:</b> ${n.vehicle_no}</p>
                        <p><b>Owner Name:</b> ${n.owner_name}</p>
                        <p><b>Detected At:</b> ${new Date(n.time * 1000).toLocaleString()}</p>
                    </div>
                    <div class="notif-actions">
                        <button class="accept-btn" onclick="decideVehicle('${n.notification_id}','accept')">ACCEPT</button>
                        <button class="reject-btn" onclick="decideVehicle('${n.notification_id}','reject')">REJECT</button>
                    </div>`;
                }

                list.appendChild(card);
            });
        }

        async function decideVisitor(notificationId, decision) {
            const res = await fetch("/handle_notification", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ villa_id: villaId, notification_id: notificationId, decision: decision })
            });
            const data = await res.json();
            alert(data.status === "approved" ? "Visitor approved." : "Visitor rejected.");
            loadNotifications();
        }

        async function decideVehicle(notificationId, decision) {
            const res = await fetch("/handle_vehicle_notification", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ villa_id: villaId, notification_id: notificationId, decision: decision })
            });
            const data = await res.json();
            alert(data.status === "approved" ? "Vehicle approved." : "Vehicle rejected.");
            loadNotifications();
        }

        function goBack() {
            window.location.href = "/resident";
        }

        setInterval(loadNotifications, 8000);
        loadNotifications();
    </script>

</body>

</html>
