<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Amenity Usage</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', Arial, sans-serif;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #FFD3AC 0%, #FFB47C 100%);
            display: flex;
            justify-content: center;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 1000px;
            border-radius: 25px;
            padding: 30px 40px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.18);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        h2 {
            text-align: center;
            color: #FF7A2C;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 15px;
            border: 1px solid #FFD3AC;
            font-weight: bold;
            font-size: 16px;
            transition: border 0.3s;
        }

        select:focus {
            border-color: #FF7A2C;
            outline: none;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .cell {
            padding: 16px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            background: #fff0e3;
            color: #8a4f2a;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cell:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
        }

        .green {
            background: #e7ffe7;
            color: #1b7d1b;
        }

        .red {
            background: #ffe7e7;
            color: #a30000;
        }

        .slots {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .slot {
            padding: 16px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 14px;
            background: #fff3cd;
            color: #856404;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .slot:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
        }

        @media (max-width: 768px) {
            .calendar {
                grid-template-columns: repeat(4, 1fr);
            }

            .slots {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }

        @media (max-width: 480px) {
            .calendar {
                grid-template-columns: repeat(2, 1fr);
            }

            .slot {
                font-size: 13px;
                padding: 12px;
            }

            select {
                font-size: 14px;
                padding: 12px 14px;
            }

            h2 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>AMENITY USAGE DETAILS</h2>

        <select id="amenity" onchange="onAmenityChange()">
            <option value="">-- Select Amenity --</option>
            <option value="CLUBHOUSE">Clubhouse</option>
            <option value="POOL">Swimming Pool</option>
            <option value="GYM">Gym</option>
        </select>

        <div id="calendarSection"></div>
        <div id="slotsSection"></div>
    </div>

    <script>
        async function onAmenityChange() {
            document.getElementById("calendarSection").innerHTML = "";
            document.getElementById("slotsSection").innerHTML = "";

            const amenity = document.getElementById("amenity").value;
            if (amenity === "CLUBHOUSE") loadClubhouse();
            if (amenity === "POOL" || amenity === "GYM") loadPoolGym(amenity);
        }

        async function loadClubhouse() {
            const res = await fetch("/get_clubhouse_calendar");
            const data = await res.json();

            const cal = document.createElement("div");
            cal.className = "calendar";

            Object.keys(data).forEach(date => {
                const d = data[date];
                const cell = document.createElement("div");
                cell.className = "cell red";
                cell.innerHTML = `
                    ${date}<br>
                    Booked by: <b>${d.villa_id}</b>
                `;
                cal.appendChild(cell);
            });

            document.getElementById("calendarSection").appendChild(cal);
        }

        async function loadPoolGym(type) {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const dateKey = tomorrow.toISOString().split("T")[0];

            const res = await fetch(`/get_pool_gym_slots?amenity=${type}&date=${dateKey}`);
            const data = await res.json();

            const slotsDiv = document.createElement("div");
            slotsDiv.className = "slots";

            Object.keys(data).forEach(slotKey => {
                const villas = Object.keys(data[slotKey].villas || {});
                const slot = document.createElement("div");
                slot.className = "slot";
                slot.innerHTML = `
                    Slot ${slotKey}<br>
                    Villas: <b>${villas.join(", ") || "None"}</b>
                `;
                slotsDiv.appendChild(slot);
            });

            document.getElementById("slotsSection").appendChild(slotsDiv);
        }
    </script>
</body>

</html>
