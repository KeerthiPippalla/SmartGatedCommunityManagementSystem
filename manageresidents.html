<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Manage Residents</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', Arial, sans-serif;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #FFD3AC 0%, #FFB47C 100%);
            display: flex;
            justify-content: center;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 900px;
            border-radius: 25px;
            padding: 30px 40px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.18);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        h2 {
            text-align: center;
            color: #FF7A2C;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
        }

        th,
        td {
            padding: 14px;
            text-align: center;
            font-weight: 500;
        }

        th {
            background: #FFD3AC;
            font-weight: bold;
            font-size: 16px;
        }

        tr:nth-child(even) {
            background: #fff7f0;
        }

        tr:hover {
            background: #ffe7cc;
        }

        .delete-btn {
            background: #ff4d4d;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
        }

        .delete-btn:hover {
            background: #e60000;
            transform: translateY(-2px);
        }

        .back-btn {
            margin-top: 20px;
            padding: 14px 20px;
            background: #FFD3AC;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .back-btn:hover {
            background: #ffc08a;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            h2 {
                font-size: 24px;
            }

            .delete-btn {
                padding: 6px 12px;
                font-size: 14px;
            }

            .back-btn {
                font-size: 14px;
                padding: 12px 18px;
            }
        }

        @media (max-width: 480px) {
            h2 {
                font-size: 20px;
            }

            .delete-btn {
                padding: 5px 10px;
                font-size: 13px;
            }

            .back-btn {
                font-size: 13px;
                padding: 10px 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>MANAGE RESIDENTS</h2>

        <table id="residentsTable">
            <thead>
                <tr>
                    <th>Resident Username</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

        <button class="back-btn" onclick="goBack()">⬅ BACK TO ADMIN</button>
    </div>

    <script>
        async function loadResidents() {
            try {
                const res = await fetch("/get_residents");
                const data = await res.json();

                const tbody = document.querySelector("#residentsTable tbody");
                tbody.innerHTML = "";

                if (!data.residents || data.residents.length === 0) {
                    const row = document.createElement("tr");
                    row.innerHTML = `<td colspan="2">No residents found</td>`;
                    tbody.appendChild(row);
                    return;
                }

                data.residents.forEach(r => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td>${r.username}</td>
                        <td>
                            <button class="delete-btn" onclick="deleteResident('${r.username}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error("Error loading residents:", err);
                alert("Failed to load residents.");
            }
        }

        async function deleteResident(username) {
            if (!confirm(`Are you sure you want to delete resident "${username}"?`)) return;

            try {
                const res = await fetch("/delete_resident", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username })
                });

                const data = await res.json();

                if (data.status === "success") {
                    alert("Resident deleted successfully.");
                    loadResidents();
                } else {
                    alert("Delete failed: " + (data.message || "Unknown error"));
                }
            } catch (err) {
                console.error("Delete error:", err);
                alert("Server error while deleting resident.");
            }
        }

        function goBack() {
            window.location.href = "/admin";
        }

        loadResidents();
    </script>

</body>

</html>
